<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="tech-glow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
            <stop offset="50%" stop-color="#818cf8" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.1" />
        </linearGradient>

        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
        </pattern>

        <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="rgba(255, 255, 255, 0.05)" />
        </pattern>
    </defs>

    <rect width="100%" height="100%" fill="rgba(15, 23, 42, 0.95)" />

    <rect width="100%" height="100%" fill="url(#grid)" />

    <path d="M-200,100 C200,300 400,-100 800,200 C1200,500 1500,100 2100,400 L2100,1200 L-200,1200 Z" fill="url(#tech-glow)" />
    <path d="M-200,400 C300,600 600,200 1100,500 C1600,800 1800,400 2100,700 L2100,1200 L-200,1200 Z" fill="rgba(15, 23, 42, 0.6)" />

    <g stroke="rgba(56, 189, 248, 0.2)" stroke-width="1.5" fill="none">
        <line x1="300" y1="200" x2="500" y2="400" />
        <line x1="500" y1="400" x2="800" y2="300" />
        <line x1="500" y1="400" x2="600" y2="700" />
        <line x1="800" y1="300" x2="1100" y2="450" />
        <line x1="1100" y1="450" x2="1400" y2="250" />
        <line x1="1100" y1="450" x2="1300" y2="750" />
        <line x1="1300" y1="750" x2="1600" y2="600" />
        <line x1="1600" y1="600" x2="1800" y2="850" />
        <line x1="1400" y1="250" x2="1700" y2="200" />
    </g>

    <g fill="#38bdf8">
        <circle cx="300" cy="200" r="3" />
        <circle cx="500" cy="400" r="5" fill="#818cf8" />
        <circle cx="800" cy="300" r="4" />
        <circle cx="600" cy="700" r="3" />
        <circle cx="1100" cy="450" r="6" fill="#2dd4bf" />
        <circle cx="1400" cy="250" r="3" />
        <circle cx="1300" cy="750" r="4" />
        <circle cx="1600" cy="600" r="5" fill="#818cf8" />
        <circle cx="1800" cy="850" r="3" />
        <circle cx="1700" cy="200" r="4" fill="#2dd4bf" />
    </g>

    <rect width="100%" height="100%" fill="url(#dots)" opacity="0.5"/>
</svg>
